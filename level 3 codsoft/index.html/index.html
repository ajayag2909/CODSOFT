<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Professional Calculator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#1e3c72,#2a5298);
    }

    .calculator{
      width:340px;
      background:#ffffff;
      padding:20px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .title{
      text-align:center;
      margin-bottom:15px;
      color:#1e3c72;
      font-size:28px;
      font-weight:bold;
    }

    #display{
      width:100%;
      height:70px;
      border:none;
      outline:none;
      border-radius:12px;
      background:#f1f3f6;
      text-align:right;
      font-size:32px;
      padding:15px;
      margin-bottom:20px;
      box-shadow: inset 2px 2px 8px rgba(0,0,0,0.1);
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    button{
      height:65px;
      border:none;
      border-radius:12px;
      font-size:22px;
      cursor:pointer;
      transition:0.2s;
      font-weight:bold;
    }

    button:hover{
      transform:scale(1.05);
    }

    .number{
      background:#e9ecef;
      color:#000;
    }

    .operator{
      background:#1e90ff;
      color:white;
    }

    .equal{
      background:#28a745;
      color:white;
      grid-column:span 2;
    }

    .clear{
      background:#dc3545;
      color:white;
    }

    .delete{
      background:#ff9800;
      color:white;
    }
  </style>
</head>

<body>

  <div class="calculator">
    <div class="title">Calculator</div>

    <input type="text" id="display" disabled />

    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">AC</button>
      <button class="delete" onclick="deleteLast()">DEL</button>
      <button class="operator" onclick="appendValue('%')">%</button>
      <button class="operator" onclick="appendValue('/')">÷</button>

      <button class="number" onclick="appendValue('7')">7</button>
      <button class="number" onclick="appendValue('8')">8</button>
      <button class="number" onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button class="number" onclick="appendValue('4')">4</button>
      <button class="number" onclick="appendValue('5')">5</button>
      <button class="number" onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button class="number" onclick="appendValue('1')">1</button>
      <button class="number" onclick="appendValue('2')">2</button>
      <button class="number" onclick="appendValue('3')">3</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button class="number" onclick="appendValue('0')">0</button>
      <button class="number" onclick="appendValue('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let display = document.getElementById("display");

    function appendValue(value) {
      display.value += value;
    }

    function clearDisplay() {
      display.value = "";
    }

    function deleteLast() {
      display.value = display.value.slice(0, -1);
    }

    function calculate() {
      try {
        display.value = eval(display.value);
      } 
      catch {
        display.value = "Error";
      }
    }

    document.addEventListener("keydown", function(event) {
      const key = event.key;

      if (!isNaN(key) || ['+', '-', '*', '/', '.', '%'].includes(key)) {
        appendValue(key);
      }
      else if (key === "Enter") {
        calculate();
      }
      else if (key === "Backspace") {
        deleteLast();
      }
      else if (key === "Escape") {
        clearDisplay();
      }
    });
  </script>

</body>
</html>
